<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo gradient verde oscuro a dorado -->
  <rect width="64" height="64" rx="12" fill="url(#grad1)"/>
  
  <!-- Definición del gradiente -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2f2f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9a574;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Texto "BA" centrado -->
  <text 
    x="32" 
    y="44" 
    font-family="Arial, sans-serif" 
    font-size="28" 
    font-weight="bold" 
    fill="#c9a574" 
    text-anchor="middle"
    style="text-shadow: 0 2px 4px rgba(0,0,0,0.3)">BA</text>
</svg>
